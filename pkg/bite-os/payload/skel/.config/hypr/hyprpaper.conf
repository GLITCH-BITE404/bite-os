# hyprpaper.conf — minimal stub.
# Real wallpaper handling lives in ~/.config/hypr/scripts/wallpaper.sh which
# uses caelestia's own picker for images and mpvpaper for videos. That script
# pkills hyprpaper on every run, so preloads here would just get killed.
# This file stays so anything that explicitly sources hyprpaper doesn't error.
splash = false
ipc = off
