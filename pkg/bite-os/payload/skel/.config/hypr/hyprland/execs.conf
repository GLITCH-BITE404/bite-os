# -----------------------------------------------------
# Keyring and Auth
# -----------------------------------------------------
# REMOVED sww-daemon (swww not installed/needed)
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# -----------------------------------------------------
# Clipboard & Maintenance
# -----------------------------------------------------
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = trash-empty 30

# -----------------------------------------------------
# Cursors & Visuals
# -----------------------------------------------------
exec-once = hyprctl setcursor $cursorTheme $cursorSize
exec-once = gsettings set org.gnome.desktop.interface cursor-theme '$cursorTheme'
exec-once = gsettings set org.gnome.desktop.interface cursor-size $cursorSize

# -----------------------------------------------------
# Services
# -----------------------------------------------------
# BITE-OS post-login splash — disabled (was just a useless 7s kiosk after login).
# exec-once = ~/.local/share/bite-os/splash/play-splash.sh

exec-once = /usr/lib/geoclue-2.0/demos/agent
exec-once = sleep 1 && gammastep
exec-once = mpris-proxy
exec-once = caelestia resizer -d

# -----------------------------------------------------
# Shell & Wallpaper (The Heart of the Build)
# -----------------------------------------------------
# Pre-gen thumbnails for that slick picker UI
exec-once = ~/.config/hypr/scripts/wall-thumbs.sh

# Launch the desktop environment shell.
# NOTE: disabled to fix the double-launch race — launch_qs.sh (hyprland.conf:35,
# also bound to Super+Shift+R) is the single source of truth for starting the
# shell. Having both caused "instance already running" + a bar with no
# workspaces. Re-enable only if launch_qs.sh is removed.
# exec-once = caelestia shell -d

# Restore the vibe: image -> hyprpaper, video -> mpvpaper
exec-once = ~/.config/hypr/scripts/wallpaper.sh restore

# Auto-pause mpvpaper while any window is fullscreen — saves ~9% CPU
# when the wallpaper isn't even visible.
exec-once = ~/.config/hypr/scripts/mpvpaper-autopause.sh

# Background reaper: kills duplicate/ghost wallpaper daemons (keeps newest,
# one per monitor) so stacked mpvpaper can never silently eat CPU.
exec-once = ~/.config/hypr/scripts/wallpaper-guard.sh

# Restore the ilyamiro × caelestia animation blend if it was active
# at last shutdown. Default state (first boot) is "on".
exec-once = ~/.config/glitch/bin/blend-toggle.sh restore
