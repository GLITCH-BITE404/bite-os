# ######## Window rules ########
windowrule = opacity $windowOpacity override, match:fullscreen false

windowrule = opaque true, match:class foot|equibop|org\.quickshell|imv|swappy  # They use native transparency or we want them opaque
windowrule = center true, match:float true, match:xwayland false  # Center all floating windows (not xwayland cause popups)

# Float
windowrule = float true, match:class guifetch  # FlafyDev/guifetch
windowrule = float true, match:class yad
windowrule = float true, match:class zenity
windowrule = float true, match:class wev
windowrule = float true, match:class org\.gnome\.FileRoller
windowrule = float true, match:class file-roller  # WHY IS THERE TWOOOOOOOOOOOOOOOO
windowrule = float true, match:class blueman-manager
windowrule = float true, match:class com\.github\.GradienceTeam\.Gradience
windowrule = float true, match:class feh
windowrule = float true, match:class imv
windowrule = float true, match:class system-config-printer
windowrule = float true, match:class org\.quickshell

# Float, resize and center
windowrule = float true, match:class foot, match:title nmtui
windowrule = size 60% 70%, match:class foot, match:title nmtui
windowrule = center 1, match:class foot, match:title nmtui
windowrule = float true, match:class org\.gnome\.Settings
windowrule = size 70% 80%, match:class org\.gnome\.Settings
windowrule = center 1, match:class org\.gnome\.Settings
windowrule = float true, match:class org\.pulseaudio\.pavucontrol|yad-icon-browser
windowrule = size 60% 70%, match:class org\.pulseaudio\.pavucontrol|yad-icon-browser
windowrule = center 1, match:class org\.pulseaudio\.pavucontrol|yad-icon-browser
windowrule = float true, match:class nwg-look
windowrule = size 50% 60%, match:class nwg-look
windowrule = center 1, match:class nwg-look

# Special workspaces
windowrule = workspace special:sysmon, match:class btop
windowrule = workspace special:music, match:class feishin|Spotify|Supersonic|Cider|com.github.th_ch.youtube_music|Plexamp|com-maxrave-simpmusic-MainKt
windowrule = workspace special:music, match:initial_title Spotify( Free)?  # Spotify wayland, it has no class for some reason
windowrule = workspace special:communication, match:class discord|equibop|vesktop|whatsapp
windowrule = workspace special:todo, match:class Todoist

# Dialogs
windowrule = float true, match:title (Select|Open)( a)? (File|Folder)(s)?
windowrule = float true, match:title File (Operation|Upload)( Progress)?
windowrule = float true, match:title .* Properties
windowrule = float true, match:title Export Image as PNG
windowrule = float true, match:title GIMP Crash Debug
windowrule = float true, match:title Save As
windowrule = float true, match:title Library

# Picture in picture (resize and move done via script)
windowrule = move 100%-w-2% 100%-w-3%, match:title Picture(-| )in(-| )[Pp]icture  # Initial move so window doesn't shoot across the screen from the center
windowrule = keep_aspect_ratio true, match:title Picture(-| )in(-| )[Pp]icture
windowrule = float true, match:title Picture(-| )in(-| )[Pp]icture
windowrule = pin true, match:title Picture(-| )in(-| )[Pp]icture

# Creative software
windowrule = opaque true, match:class krita|gimp|inkscape|darktable|resolve|kdenlive|shotcut|blender|godot

# Ueberzugpp
windowrule = float true, match:class ^(ueberzugpp_.*)$
windowrule = no_initial_focus true, match:class ^(ueberzugpp_.*)$

# Steam
windowrule = rounding 10, match:class steam
windowrule = float true, match:title Friends List, match:class steam

# Games (Steam, Lutris/Wine, Gamescope)
windowrule = opaque true, match:class (steam_app_(default|[0-9]+))|gamescope
windowrule = immediate true, match:class (steam_app_(default|[0-9]+))|gamescope  # Allow tearing for games
windowrule = idle_inhibit always, match:class (steam_app_(default|[0-9]+))|gamescope  # Always idle inhibit when playing a game

# Minecraft launcher consoles
windowrule = float true, match:class com-atlauncher-App, match:title ATLauncher Console
windowrule = float true, match:class PandoraLauncher, match:title Minecraft Game Output

# Autodesk Fusion 360
windowrule = no_blur true, match:title Fusion360|(Marking Menu), match:class fusion360\.exe

# Ugh xwayland popups
windowrule = no_dim true, match:xwayland 1, match:title win[0-9]+
windowrule = no_shadow true, match:xwayland 1, match:title win[0-9]+
windowrule = rounding 10, match:xwayland 1, match:title win[0-9]+

# BITE-OS post-login splash — fullscreen kiosk Chrome window (~7s)
windowrule = float true, match:class bite-splash
windowrule = fullscreen true, match:class bite-splash
windowrule = pin true, match:class bite-splash
windowrule = rounding 0, match:class bite-splash
windowrule = no_anim true, match:class bite-splash
windowrule = no_shadow true, match:class bite-splash
windowrule = no_blur true, match:class bite-splash
windowrule = no_initial_focus true, match:class bite-splash
windowrule = opaque true, match:class bite-splash

# BITE-OS glitch mode — chomp overlay (fullscreen flash, ~1.6s)
windowrule = float true, match:class bite-chomp
windowrule = size 100% 100%, match:class bite-chomp
windowrule = move 0 0, match:class bite-chomp
windowrule = pin true, match:class bite-chomp
windowrule = no_initial_focus true, match:class bite-chomp
windowrule = no_anim true, match:class bite-chomp
windowrule = no_shadow true, match:class bite-chomp
windowrule = no_blur true, match:class bite-chomp
windowrule = opaque true, match:class bite-chomp

# BITE-OS glitch mode — HUD widget (top-right, pinned, click-passive)
windowrule = float true, match:class bite-hud
windowrule = size 28% 32%, match:class bite-hud
windowrule = move 100%-w-20 60, match:class bite-hud
windowrule = pin true, match:class bite-hud
windowrule = no_shadow true, match:class bite-hud
windowrule = no_anim true, match:class bite-hud
windowrule = no_initial_focus true, match:class bite-hud
windowrule = no_focus true, match:class bite-hud

# BITE-OS glitch mode — fangs slamming in (top + bottom halves)
# Transparent surface (no opaque rule), slide animation, no blur/shadow.
windowrule = float true, match:class bite-fangs-top
windowrule = size 100% 50%, match:class bite-fangs-top
windowrule = move 0 0, match:class bite-fangs-top
windowrule = pin true, match:class bite-fangs-top
windowrule = no_shadow true, match:class bite-fangs-top
windowrule = no_blur true, match:class bite-fangs-top
windowrule = no_initial_focus true, match:class bite-fangs-top
windowrule = no_focus true, match:class bite-fangs-top
windowrule = animation slide, match:class bite-fangs-top

windowrule = float true, match:class bite-fangs-bot
windowrule = size 100% 50%, match:class bite-fangs-bot
windowrule = move 0 50%, match:class bite-fangs-bot
windowrule = pin true, match:class bite-fangs-bot
windowrule = no_shadow true, match:class bite-fangs-bot
windowrule = no_blur true, match:class bite-fangs-bot
windowrule = no_initial_focus true, match:class bite-fangs-bot
windowrule = no_focus true, match:class bite-fangs-bot
windowrule = animation slide, match:class bite-fangs-bot

# BITE-OS glitch mode — periodic skull flash (centred)
windowrule = float true, match:class bite-skull
windowrule = size 50% 50%, match:class bite-skull
windowrule = move 25% 25%, match:class bite-skull
windowrule = pin true, match:class bite-skull
windowrule = no_shadow true, match:class bite-skull
windowrule = no_blur true, match:class bite-skull
windowrule = no_initial_focus true, match:class bite-skull
windowrule = no_focus true, match:class bite-skull

# BITE-OS glitch mode — random hacking terminals (4 quadrants)
windowrule = float true, match:class bite-hack-1
windowrule = size 30% 32%, match:class bite-hack-1
windowrule = move 30 80, match:class bite-hack-1
windowrule = pin true, match:class bite-hack-1
windowrule = no_initial_focus true, match:class bite-hack-1
windowrule = no_shadow true, match:class bite-hack-1

windowrule = float true, match:class bite-hack-2
windowrule = size 28% 30%, match:class bite-hack-2
windowrule = move 100%-w-30 100%-h-30, match:class bite-hack-2
windowrule = pin true, match:class bite-hack-2
windowrule = no_initial_focus true, match:class bite-hack-2
windowrule = no_shadow true, match:class bite-hack-2

windowrule = float true, match:class bite-hack-3
windowrule = size 26% 28%, match:class bite-hack-3
windowrule = move 40 100%-h-40, match:class bite-hack-3
windowrule = pin true, match:class bite-hack-3
windowrule = no_initial_focus true, match:class bite-hack-3
windowrule = no_shadow true, match:class bite-hack-3

windowrule = float true, match:class bite-hack-4
windowrule = size 24% 26%, match:class bite-hack-4
windowrule = move 38% 38%, match:class bite-hack-4
windowrule = pin true, match:class bite-hack-4
windowrule = no_initial_focus true, match:class bite-hack-4
windowrule = no_shadow true, match:class bite-hack-4

# ######## Workspace rules ########
workspace = w[tv1]s[false], gapsout:$singleWindowGapsOut
workspace = f[1]s[false], gapsout:$singleWindowGapsOut

# ######## Layer rules ########
layerrule = animation fade, match:namespace hyprpicker  # Colour picker out animation
layerrule = animation fade, match:namespace logout_dialog  # wlogout
layerrule = animation fade, match:namespace selection  # slurp
layerrule = animation fade, match:namespace wayfreeze

# Fuzzel
layerrule = animation popin 80%, match:namespace launcher
layerrule = blur true, match:namespace launcher

# Shell
layerrule = no_anim true, match:namespace caelestia-(border-exclusion|area-picker)
layerrule = animation fade, match:namespace caelestia-(drawers|background)
