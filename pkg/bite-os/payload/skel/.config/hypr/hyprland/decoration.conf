decoration {
    rounding = 12

    # We’re bumping this up from 0.85 to 0.90
    # It keeps the "ghost" look but stops the browser from looking washed out
    active_opacity = 0.90
    inactive_opacity = 0.80

    blur {
        enabled = true
        xray = true
        ignore_opacity = true
        new_optimizations = true
        special = false   # don't waste passes blurring the scratchpad you can't see

        # Increasing size slightly to hide the browser's "white glare"
        size = 5
        passes = 2   # 3->2: near-identical look, noticeably lighter on the iGPU
        brightness = 1.0
    }

    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(00000066)
    }
}

