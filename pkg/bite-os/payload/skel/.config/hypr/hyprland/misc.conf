misc {
    vrr = 1

    animate_manual_resizes = false
    animate_mouse_windowdragging = false

    disable_hyprland_logo = true
    force_default_wallpaper = 0

    on_focus_under_fullscreen = 2
    allow_session_lock_restore = true
    middle_click_paste = false
    focus_on_activate = true
    session_lock_xray = true

    mouse_move_enables_dpms = true
    key_press_enables_dpms = true

	background_color = rgb($surfaceContainer)
}

render {
    # direct_scanout caused the video wallpaper to flash black rapidly on this
    # setup (layer-shell + mpvpaper fight over the buffer handoff). Left OFF.
    # Fullscreen game tearing still works via general:allow_tearing.
    direct_scanout = false
}

debug {
    error_position = 1
    damage_tracking = 2   # only redraw changed regions per frame
}
