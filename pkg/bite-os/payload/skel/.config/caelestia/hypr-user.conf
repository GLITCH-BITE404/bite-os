# Master's custom vibe tweaks
general {
    gaps_in = 6
    # TRBL — smaller left gap shifts windows toward the dock side
    gaps_out = 12, 12, 12, 4
    border_size = 2
    col.active_border = rgba(bb9af7ff) 45deg
    col.inactive_border = rgba(565f89aa)
}

exec-once = sleep 3 && pkill mpvpaper || true && mpvpaper -o "--hwdec=vaapi --vo=gpu --gpu-context=wayland --vd-lavc-dr=yes --sws-scaler=fast --no-audio --loop" eDP-1 "/home/glitchbite404/הורדות/Minecraft.mp4"
