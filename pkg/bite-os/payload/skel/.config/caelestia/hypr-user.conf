# Master's custom vibe tweaks
general {
    gaps_in = 6
    # TRBL — smaller left gap shifts windows toward the dock side
    gaps_out = 12, 12, 12, 4
    border_size = 2
    col.active_border = rgba(bb9af7ff) 45deg
    col.inactive_border = rgba(565f89aa)
}

# Wallpaper is handled by wallpaper.sh (restore on login) + the wallpaper-guard —
# no hardcoded monitor name or per-user file path here, so it works on any machine.
