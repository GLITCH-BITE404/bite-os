LABEL BITE-OS
TEXT HELP
Boot the BITE-OS install medium on BIOS.
It allows you to install BITE-OS or perform system maintenance.
ENDTEXT
MENU LABEL BITE-OS install medium (%ARCH%, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID%

# Accessibility boot option
LABEL biteosspeech
TEXT HELP
Boot the BITE-OS install medium on BIOS with speakup screen reader.
It allows you to install BITE-OS or perform system maintenance with speech feedback.
ENDTEXT
MENU LABEL BITE-OS install medium (%ARCH%, BIOS) with ^speech
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% accessibility=on
