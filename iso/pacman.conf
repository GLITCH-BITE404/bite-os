# BITE-OS — pacman.conf used by mkarchiso to assemble the ISO.
# Repos mirror the CachyOS host, plus the local [bite-os] repo (built by
# repo/build-repo.sh) which carries the bite-os package + the 27 AUR packages.

[options]
HoldPkg      = pacman glibc
Architecture = auto
ParallelDownloads = 5
# Build-time only: skip GPG verification while assembling the ISO from
# official mirrors. The INSTALLED BITE-OS keeps normal signature checking
# (it has its own /etc/pacman.conf). Needed because a CachyOS mirror has a
# transiently mis-signed package (swaylock-effects-git).
SigLevel           = Never
LocalFileSigLevel  = Never

# --- BITE-OS local repo — listed FIRST so bite-os packages win ---
[bite-os]
SigLevel = Optional TrustAll
Server = file:///home/glitchbite404/bite-os-distro/repo/x86_64

# --- CachyOS repos (the performance base) ---
[cachyos-v3]
Include = /etc/pacman.d/cachyos-v3-mirrorlist

[cachyos-core-v3]
Include = /etc/pacman.d/cachyos-v3-mirrorlist

[cachyos-extra-v3]
Include = /etc/pacman.d/cachyos-v3-mirrorlist

[cachyos]
Include = /etc/pacman.d/cachyos-mirrorlist

# --- Arch repos ---
[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist
