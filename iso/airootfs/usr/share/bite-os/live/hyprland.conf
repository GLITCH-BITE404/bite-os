# ━━━ BITE-OS — LIVE-ISO Hyprland config (minimal & bulletproof) ━━━
# This is NOT the real BITE-OS rice. The full caelestia/quickshell rice ships
# on the INSTALLED system (via the bite-os package's /etc/skel). On the live
# ISO that heavy shell crashes inside the boot overlay and drops you into
# emergency Hyprland — which also leaves the installer with no usable Wayland
# session. So the live session deliberately runs this tiny config whose only
# job is: show the wallpaper, give you a terminal, and launch the installer.

monitor = , preferred, auto, 1

# --- startup ---
exec-once = hyprpaper
exec-once = mako
exec-once = /usr/local/bin/bite-os-launch-installer

# --- variables ---
$mod  = SUPER
$term = kitty

# --- keybinds (just enough to be usable) ---
bind = $mod, RETURN, exec, $term
bind = $mod, T, exec, $term
bind = $mod, Q, killactive
bind = $mod, E, exec, thunar
bind = $mod, I, exec, /usr/local/bin/install-bite-os
bind = $mod, M, exec, wofi --show drun
bind = $mod, F, fullscreen
bind = $mod, SPACE, togglefloating
bind = $mod SHIFT, Q, exit
# move focus
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# --- input ---
input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = yes
    }
}

# --- look (BITE-OS purple/cyan glitch accent) ---
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(bd46dcee) rgba(00ffccee) 45deg
    col.inactive_border = rgba(1a1a2aaa)
    layout = dwindle
}

decoration {
    rounding = 8
}

animations {
    enabled = yes
    bezier = ease, 0.25, 0.1, 0.25, 1.0
    animation = windows, 1, 4, ease
    animation = fade, 1, 4, ease
    animation = workspaces, 1, 4, ease
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}
