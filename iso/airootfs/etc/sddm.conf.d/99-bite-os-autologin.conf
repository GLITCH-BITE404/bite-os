# BITE-OS live ISO — autologin straight into the Calamares installer kiosk.
# High number (99) so nothing in the base/cachyos sddm config can override the
# session we boot into. On the INSTALLED system the `bite` live user does not
# exist, so this autologin simply no-ops and a normal login screen appears
# (the bite-os-firstboot-cleanup service also removes these live-only files).
[Autologin]
User=bite
Session=bite-os-install

[Theme]
Current=bite-os
