# ━━━ BITE-OS — Calamares installer sequence ━━━
# Live-ISO install: copies the squashfs root to disk (unpackfs), then
# configures the new system. Branding + module configs live alongside this.
---
modules-search: [ local, /usr/lib/calamares/modules ]

instances:
- id:       rootfs
  module:   unpackfs
  config:   unpackfs.conf

sequence:
- show:
  - welcome
  - locale
  - keyboard
  - partition
  - users
  - summary
- exec:
  - partition
  - mount
  - unpackfs
  - machineid
  - fstab
  - locale
  - keyboard
  - localecfg
  - users
  - displaymanager
  - networkcfg
  - hwclock
  - services-systemd
  - grubcfg
  - bootloader
  - packages
  - umount
- show:
  - finished

branding: bite-os

prompt-install: true
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: false
quit-at-end: false
